name: Run Gosec
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  gosec:
    name: GoSec Security Scanner
    runs-on: buildah-full
    steps:
      - name: Checkout Source
        uses: actions/checkout@v7
      - name: Run Gosec Security Scanner
        uses: https://git.aads.cloud/mirrors/gosec@v2.27.1
        with:
          args: ./...
